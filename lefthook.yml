# yaml-language-server: $schema=./node_modules/lefthook/schema.json

pre-commit:
  parallel: false
  jobs:
    - run: pnpm codegen
    - run: pnpm fmt
      stage_fixed: true
    - run: pnpm lint:fix
      stage_fixed: true
    - run: |
        git add \
         src/payload-types.ts \
         "src/app/(payload)/admin/importMap.js"
