$schema: ./node_modules/lefthook/schema.json
colors: false
pre-commit:
  parallel: true
  commands:
    lint:
      run: pnpm exec oxlint {staged_files} --no-error-on-unmatched-pattern
    format:
      run: pnpm exec oxfmt {staged_files} --no-error-on-unmatched-pattern
    build:
      run: |
        moon run :codegen;
        git add \
         src/payload-types.ts \
         "src/app/(payload)/admin/importMap.js" \
         src/payload-generated-schema.ts;
        moon run :build;
