name: Setup
description: Install toolchain, restore caches, and install dependencies

runs:
  using: composite
  steps:
    - name: Install toolchain
      uses: moonrepo/setup-toolchain@v0
      with:
        auto-install: true
        cache-base: main

    - name: Get pnpm store path
      id: pnpm-cache
      shell: bash
      run: echo "store=$(pnpm store path --silent 2>/dev/null | tail -1)" >> $GITHUB_OUTPUT

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-cache.outputs.store }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Cache moon artifacts
      uses: actions/cache@v4
      with:
        path: |
          .moon/cache/hashes
          .moon/cache/outputs
        key: ${{ runner.os }}-moon-${{ hashFiles('.prototools', '.moon/workspace.yml', '.moon/toolchains.yml', '**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-moon-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --ignore-scripts
