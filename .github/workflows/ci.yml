name: CI

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup proto
        uses: moonrepo/setup-proto@v0
        with:
          # Automatically runs 'proto install' based on your .prototools file
          # This ensures the exact Node.js and pnpm versions are used.
          auto-install: true

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint changed files with oxlint
        shell: bash
        run: |
          echo "Fetching changed files..."
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(js|jsx|ts|tsx)$' | xargs)

          if [ -n "$FILES" ]; then
            echo "Linting: $FILES"
            pnpm exec oxlint $FILES
          else
            echo "No JS/TS files changed in this PR. Skipping lint."
          fi

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
