name: CI

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - run: proto use

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint changed files with oxlint
        shell: bash
        run: |
          echo "Fetching changed files..."
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(js|jsx|ts|tsx)$' | xargs)

          if [ -n "$FILES" ]; then
            echo "Linting: $FILES"
            pnpm exec oxlint $FILES
          else
            echo "No JS/TS files changed in this PR. Skipping lint."
          fi

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
