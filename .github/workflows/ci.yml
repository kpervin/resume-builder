name: CI

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - run: proto use

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint changed files with oxlint
        shell: bash
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | xargs)
          if [ -n "$FILES" ]; then
            echo "Linting changed files: $FILES"
            pnpm exec oxlint $FILES
          else
            echo "No files changed in this PR. Skipping lint."
          fi

      - name: Build
        run: pnpm run build

      - name: Install Playwright Browsers
        run: pnpx playwright install --with-deps

      - name: Test
        run: pnpm run test
